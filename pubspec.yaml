name: flutter_live_location
description: >-
  A Flutter plugin for real-time location tracking with configurable intervals
  and distance filters. Supports foreground and background tracking on Android
  and iOS.
version: 0.6.2
homepage: https://github.com/VigneshJagannadhan/flutter_live_location
repository: https://github.com/VigneshJagannadhan/flutter_live_location
issue_tracker: https://github.com/VigneshJagannadhan/flutter_live_location/issues

topics:
  - location
  - gps
  - geolocation
  - tracking
  - background-location

environment:
  sdk: ^3.10.8
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.live_location
        pluginClass: LiveLocationPlugin
      ios:
        pluginClass: LiveLocationPlugin
