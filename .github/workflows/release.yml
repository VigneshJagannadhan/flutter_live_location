name: Release

# Triggers on every push to main (i.e. after a PR is merged).
on:
  push:
    branches: [main]

permissions:
  contents: write

# Prevent two release runs from racing each other.
# If a second push lands while a release is in progress, cancel the older run
# and let the newer one (which includes both sets of commits) take over.
concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    name: Auto Release
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      # Uses RELEASE_PAT so the release commit can be pushed back to the
      # protected main branch.  Add yourself as a bypass actor in:
      #   Settings → Branches → main protection rule →
      #   "Allow specified actors to bypass required pull requests"
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      # ── Flutter SDK ───────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── Guard: skip when this push is itself a release commit ─────────────────
      # Prevents the workflow from re-triggering endlessly after it pushes the
      # "chore(release): x.y.z" commit back to main.
      - name: Check for release-commit loop
        id: guard
        run: |
          LAST_MSG=$(git log -1 --format="%s")
          if [[ "$LAST_MSG" == "chore(release):"* ]]; then
            echo "Last commit is a release commit — nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Analyze commits → decide version bump ────────────────────────────────
      # Pre-1.0.0 policy (from ci-cd-rules.md):
      #   feat / feat! / BREAKING CHANGE → minor bump (0.x.0)
      #   fix                            → patch bump (0.0.x)
      #   anything else                  → no release
      - name: Compute release version
        if: steps.guard.outputs.skip == 'false'
        id: release
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --format="%s" HEAD)
          else
            COMMITS=$(git log --format="%s" "${LAST_TAG}..HEAD")
          fi

          echo "──── Commits to analyze ────"
          echo "$COMMITS"
          echo "────────────────────────────"

          BUMP=""
          if echo "$COMMITS" | grep -qE \
               "^feat(\([^)]+\))?(!)?: |^BREAKING CHANGE:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^fix(\([^)]+\))?: "; then
            BUMP="patch"
          fi

          if [ -z "$BUMP" ]; then
            echo "No releasable commits — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          echo "skip=false"          >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG"   >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP"           >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION  (bump: $BUMP)"

      # ── Prepare local changes (not committed yet) ─────────────────────────────
      - name: Bump version in pubspec.yaml
        if: >
          steps.guard.outputs.skip == 'false' &&
          steps.release.outputs.skip == 'false'
        run: |
          NEW_VERSION="${{ steps.release.outputs.version }}"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: Generate CHANGELOG entry
        if: >
          steps.guard.outputs.skip == 'false' &&
          steps.release.outputs.skip == 'false'
        run: |
          NEW_VERSION="${{ steps.release.outputs.version }}"
          LAST_TAG="${{ steps.release.outputs.last_tag }}"
          DATE=$(date +%Y-%m-%d)

          if [ -z "$LAST_TAG" ]; then
            RAW=$(git log --format="%s" HEAD)
          else
            RAW=$(git log --format="%s" "${LAST_TAG}..HEAD")
          fi

          FEATS=$(echo "$RAW" | \
            grep -E "^feat(\([^)]+\))?(!)?: " | \
            sed -E 's/^feat(\([^)]+\))?(!)?: /- /' \
            || true)
          FIXES=$(echo "$RAW" | \
            grep -E "^fix(\([^)]+\))?: " | \
            sed -E 's/^fix(\([^)]+\))?: /- /' \
            || true)

          {
            echo "## ${NEW_VERSION} — ${DATE}"
            echo ""
            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo ""
              echo "$FEATS"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo ""
              echo "$FIXES"
              echo ""
            fi
          } > /tmp/new_entry.md

          # Prepend to CHANGELOG.md, creating it if it doesn't yet exist.
          touch CHANGELOG.md
          cat /tmp/new_entry.md CHANGELOG.md > /tmp/full_changelog.md
          mv /tmp/full_changelog.md CHANGELOG.md

      # ── Publish to pub.dev FIRST ──────────────────────────────────────────────
      # The git commit and tag only happen AFTER a successful publish.
      # This ensures GitHub never shows a release that did not actually land on pub.dev.
      #
      # PUB_CREDENTIALS: run this on your Mac to get the value:
      #   security find-generic-password -s "Dart pub credentials" -w
      # Store the output (without the trailing %) as the PUB_CREDENTIALS secret.
      - name: Install Flutter dependencies
        if: >
          steps.guard.outputs.skip == 'false' &&
          steps.release.outputs.skip == 'false'
        run: flutter pub get

      - name: Publish to pub.dev
        if: >
          steps.guard.outputs.skip == 'false' &&
          steps.release.outputs.skip == 'false'
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}
        run: |
          if [ -z "$PUB_CREDENTIALS" ]; then
            echo "ERROR: PUB_CREDENTIALS secret is empty. Add it in Settings → Secrets."
            exit 1
          fi

          # Write to both credential locations (path changed in Dart 3.x)
          mkdir -p "$HOME/.pub-cache"
          mkdir -p "$HOME/.config/dart"
          printf '%s' "$PUB_CREDENTIALS" > "$HOME/.pub-cache/credentials.json"
          printf '%s' "$PUB_CREDENTIALS" > "$HOME/.config/dart/pub-credentials.json"

          echo "Credentials written. Validating JSON structure..."
          python3 - <<'PYEOF'
          import json, sys, os
          path = os.path.expanduser("~/.pub-cache/credentials.json")
          try:
              with open(path) as f:
                  data = json.load(f)
              keys = list(data.keys())
              print(f"JSON is valid. Keys found: {keys}")
              print(f"Has accessToken:  {'accessToken' in data}")
              print(f"Has refreshToken: {'refreshToken' in data and bool(data['refreshToken'])}")
          except Exception as e:
              print(f"ERROR: {e}")
              sys.exit(1)
          PYEOF

          flutter pub publish --force

      # ── Commit, tag, push — only if publish succeeded ─────────────────────────
      - name: Commit and push release
        if: >
          steps.guard.outputs.skip == 'false' &&
          steps.release.outputs.skip == 'false'
        run: |
          NEW_VERSION="${{ steps.release.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml CHANGELOG.md
          git commit -m "chore(release): ${NEW_VERSION}"
          git tag -a "v${NEW_VERSION}" -m "Release ${NEW_VERSION}"
          git push origin main --follow-tags
